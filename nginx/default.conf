server {
    listen 80;
    listen [::]:80;
    server_name clementcolin.com www.clementcolin.com localhost;

    root /var/www/html;
    index index.html;

    # Do not leak the nginx version in responses or error pages.
    server_tokens off;

    # Emit redirects with a relative Location (/about) instead of rebuilding
    # an absolute URL from the internal listen port, which would say
    # http://host:80 while the visitor is on https behind Cloudflare or on
    # :8080 during local testing.
    absolute_redirect off;

    # Compress text assets on the fly. Cloudflare also compresses at the edge,
    # this covers direct LAN access during testing.
    gzip on;
    gzip_min_length 1024;
    gzip_types text/css application/javascript image/svg+xml application/wasm text/plain application/json;

    # Baseline security headers, applied to every response. SAMEORIGIN rather
    # than DENY so the site can iframe its own pages (the raycaster demo under
    # /demos/ is embedded on its project page). Other origins still cannot
    # frame us.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Pages are linked and served without their .html extension (the try_files
    # below appends it when looking up the file). Requests for the old .html
    # form of a page redirect to the clean canonical URL, so links shared
    # before this change keep working and search engines see a single URL per
    # page. The pattern deliberately leaves /404.html and /partials/ alone.
    if ($request_uri ~ ^(/about|/resume|/projects/[a-z_-]+)\.html$) {
        return 301 $1;
    }

    # SSI stitches shared HTML fragments (e.g. the footer) into each page at
    # request time, so the markup lives in one file instead of every page.
    location / {
        ssi on;
        try_files $uri $uri.html $uri/ =404;
    }

    # Partials are pulled in via SSI include, never served as standalone pages.
    # `internal` still allows nginx subrequests, so the includes keep working.
    location /partials/ {
        internal;
    }

    # Emscripten builds under /demos/ are versionless files (index.js, .wasm,
    # .data) that must all come from the same build, so revalidate them
    # instead of letting the 30-day rule below cache a stale .wasm next to a
    # fresh .js after a rebuild. ^~ keeps the regex blocks below from
    # matching inside /demos/.
    location ^~ /demos/ {
        expires -1;
    }

    # Long-cache static assets. `expires` here rather than another add_header,
    # so the security headers above stay inherited in this block.
    # Images and fonts rarely change, cache them hard.
    location ~* \.(svg|png|jpg|jpeg|gif|webp|woff2?|mp4|wasm)$ {
        expires 30d;
    }

    # CSS changes on every deploy, so revalidate it instead of caching stale.
    location ~* \.css$ {
        expires -1;
    }

    error_page 404 /404.html;
}
